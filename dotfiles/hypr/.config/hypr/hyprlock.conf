# BACKGROUND
background {
    monitor =
    # path = ~/Pictures/Wallpapers/gojo3.jpg
    color = rgba(0, 0, 0, 1.0)
    blur_passes = 0
    contrast = 1
    brightness = 1
    vibrancy = 0
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# TIME
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M%p")"
    color = rgba(255, 255, 255, 1.0)
    font_size = 120
    font_family = JetBrains Mono Nerd Font
    position = 0, -560
    halign = center
    valign = top
}

# DAY-DATE-MONTH
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date '+%A, %d %B')</span>"
    color = rgba(255, 225, 225, 1)
    font_size = 30
    font_family = JetBrains Mono Nerd Font
    position = 0, 60
    halign = center
    valign = center
}

# SEPARATOR LINE
shape {
    monitor =
    size = 800, 2
    color = rgba(255, 255, 255, 0.5)
    rounding = -1
    border_size = 0
    border_color = rgba(0, 0, 0, 0)
    rotate = 0
    xray = false
    position = 0, -10
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text =   Hello, $USER.
    color = rgba(255, 255, 255, .65)
    font_size = 25
    font_family = JetBrains Mono Nerd Font
    position = 0, -80
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 350, 100
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(50,50,50,0.5)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = JetBrains Mono Nerd Font
    placeholder_text = <span foreground="##ffffff99">enter the password</span>
    hide_input = false
    position = 0, -200
    halign = center
    valign = center
}
