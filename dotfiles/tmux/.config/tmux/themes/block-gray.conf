# Custom Block Theme for tmux
# Gray block style

# Status bar general
set -g status on
set -g status-interval 1
set -g status-justify absolute-centre
set -g status-position bottom

# Colors
set -g status-style bg=colour235,fg=colour250

# Left side: Session name
set -g status-left-length 40
set -g status-left "#[fg=colour232,bg=colour244,bold] Session: #S #[fg=colour244,bg=colour235]"

# Right side: Spacer to balance left side for proper centering
set -g status-right-length 40
set -g status-right ""

# Window list (center)
set -g window-status-separator ""

# Inactive windows (blend with status bar)
set -g window-status-format "#[fg=colour250,bg=colour235] #I:#W "

# Active/current window (same style as session and elapsed time)
set -g window-status-current-format "#[fg=colour255,bg=colour244,bold] #I:#W #[fg=colour255,bg=colour235]"

# Pane borders
set -g pane-border-style fg=colour239
set -g pane-active-border-style fg=colour244

# Message styling
set -g message-style bg=colour239,fg=colour255
set -g message-command-style bg=colour239,fg=colour255
