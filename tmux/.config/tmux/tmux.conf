set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Reduce escape time for faster neovim response
set -sg escape-time 10

# Focus events enabled for better vim/nvim integration
set-option -g focus-events on

# Enable mouse for scrolling tmux's scrollback buffer
# Note: foot's scrollbar won't work inside tmux - this is a tmux limitation
# Use mouse wheel to scroll through tmux's buffer
set -g mouse on



set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

run '~/.tmux/plugins/tpm/tpm'

# Load custom block theme with session timer
source-file ~/.config/tmux/themes/block-gray.conf

set -g prefix C-b
bind C-b send-prefix


# Pane navigation with Ctrl + h/j/k/l
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# horizontal on prefix + h
bind h split-window -h

# vertical on prefix + v
bind v split-window -v


# Kill current window with prefix + k
bind c kill-window

# Create new window with Ctrl+q
bind -n C-q new-window

# Next window with prefix + n
bind n next-window

# Previous window with prefix + p
bind p previous-window

# Let terminal (foot) handle clipboard
set -g set-clipboard external

# Allow foot to handle Ctrl+Shift+C/V for copy/paste
# Unbind any tmux bindings that might interfere
unbind -n C-S-c
unbind -n C-S-v

# Increase scrollback buffer
set -g history-limit 50000
